function buildFYMonthKeys(){
  const fyStartYear=CUR_MONTH_IDX>=3?CUR_YEAR:CUR_YEAR-1;
  const keys=[];
  for(let i=0;i<12;i++){
    const mIdx=(3+i)%12;
    const yr=mIdx>=3?fyStartYear:fyStartYear+1;
    keys.push({key:MONTH_NAMES[mIdx]+' '+yr,label:MONTH_NAMES[mIdx].slice(0,3),mIdx,yr,fyMonth:i+1});
  }
  return keys;
}
function isBefore(k,curMIdx,curYr){
  if(k.yr<curYr)return true;
  if(k.yr===curYr&&k.mIdx<=curMIdx)return true;
  return false;
}
function buildDisplayCols(fyKeys){
  const curIdx=fyKeys.findIndex(k=>k.key===CUR_MONTH_KEY);

  const past=fyKeys.slice(0,curIdx).reverse();
  const future=fyKeys.slice(curIdx+1);
  return[fyKeys[curIdx],...past,...future];
}

// Returns combined list of base + custom accounts
function getAllAccounts(){
  const customs=(acctData.customAccounts||[]);
  return[...BASE_ACCTS,...customs];
}

function getFY26(id){
  const d=acctData[id];
  if(d&&d.fy26_override!==undefined&&d.fy26_override!==null)return d.fy26_override;
  const a=getAllAccounts().find(x=>x.id===id);
  return a?a.fy26:0;
}

async function sbFetch(path,opts={}){
  return fetch(SUPABASE_URL+'/rest/v1/'+path,{...opts,
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal',...(opts.headers||{})}});
}
async function loadData(){
  setStatus('saving','Loading...');
  try{
    const res=await sbFetch('crm_data?id=eq.'+ROW_ID+'&select=data');
    if(res.ok){
      const rows=await res.json();
      if(rows.length&&rows[0].data){
        acctData=rows[0].data;
        if(!acctData.customAccounts)acctData.customAccounts=[];
        BASE_ACCTS.forEach(a=>{
          if(!acctData[a.id])acctData[a.id]={lastContact:'',followUp:DEFAULT_FOLLOWUPS[a.id]||'',notes:[...(DEFAULT_NOTES[a.id]||[])],monthlySales:{}};
          if(!acctData[a.id].monthlySales)acctData[a.id].monthlySales={};
        });
      } else {buildDefault();await pushData();}
    } else buildDefault();
  }catch(e){buildDefault();setStatus('error','Offline');}
  setStatus('ok','Synced');render();
}
function buildDefault(){
  acctData={customAccounts:[]};
  BASE_ACCTS.forEach(a=>{acctData[a.id]={lastContact:'',followUp:DEFAULT_FOLLOWUPS[a.id]||'',notes:[...(DEFAULT_NOTES[a.id]||[])],monthlySales:{}};});
}
async function pushData(){
  const res=await sbFetch('crm_data',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({id:ROW_ID,data:acctData,updated_at:new Date().toISOString()})});
  return res.ok;
}
function saveData(){
  setStatus('saving','Saving...');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{try{const ok=await pushData();setStatus(ok?'ok':'error',ok?'Synced':'Sync error');}catch(e){setStatus('error','Sync error');}},600);
}
function setStatus(type,text){
  const dot=document.getElementById('sync-dot');const lbl=document.getElementById('sync-lbl');
  if(dot)dot.className='sync-dot'+(type==='saving'?' saving':type==='error'?' error':'');
  if(lbl)lbl.textContent=text;
}

function parseDate(s){if(!s)return null;const p=s.split('/');if(p.length===3)return new Date(parseInt(p[2]),parseInt(p[0])-1,parseInt(p[1]));return null;}
function todayDate(){const d=new Date();d.setHours(0,0,0,0);return d;}
function getStatus(id){
  const d=acctData[id];if(!d||!d.followUp)return 'future';
  const fu=parseDate(d.followUp);if(!fu)return 'future';
  const diff=Math.floor((fu-todayDate())/86400000);
  if(diff<0)return 'overdue';if(diff===0)return 'today';if(diff<=7)return 'upcoming';return 'future';
}
function fmt(n){if(!n&&n!==0)return '—';return '$'+Math.round(Math.abs(n)).toLocaleString();}
function fmtSigned(n){if(n===null||n===undefined)return '—';return(n>=0?'+':'-')+'$'+Math.round(Math.abs(n)).toLocaleString();}
function initials(name){if(!name)return '?';return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function addDays(days){const d=new Date();d.setDate(d.getDate()+days);return`${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;}
function getMS(id,key){const d=acctData[id];if(!d||!d.monthlySales)return 0;return d.monthlySales[key]||0;}
function getCurMS(id){return getMS(id,CUR_MONTH_KEY);}
function getCurTotal(){return getAllAccounts().reduce((s,a)=>s+getCurMS(a.id),0);}
function getFYYTD(id){return FY_MONTH_KEYS.filter(k=>isBefore(k,CUR_MONTH_IDX,CUR_YEAR)||k.key===CUR_MONTH_KEY).reduce((s,k)=>s+getMS(id,k.key),0);}
function getPace(id){const fy26=getFY26(id);return Math.round((fy26/12)*FY_MONTHS_ELAPSED);}

function sortAccounts(list){
  if(state.sort==='name')return list.slice().sort((a,b)=>a.company.localeCompare(b.company));
  if(state.sort==='sales')return list.slice().sort((a,b)=>getCurMS(b.id)-getCurMS(a.id));
  const ord={overdue:0,today:1,upcoming:2,future:3};
  return list.slice().sort((a,b)=>ord[getStatus(a.id)]-ord[getStatus(b.id)]);
}

function saveNewAccount(){
  const company=(document.getElementById('new-company').value||'').trim();

  const contact=(document.getElementById('new-contact').value||'').trim();

  const product=(document.getElementById('new-product').value||'').trim();
  const fy26=parseFloat(document.getElementById('new-fy26').value)||0;
  const followUpRaw=document.getElementById('new-followup').value;
  let followUp='';
  if(followUpRaw){const[y,m,d]=followUpRaw.split('-');followUp=`${parseInt(m)}/${parseInt(d)}/${y}`;}

  // Generate unique ID (timestamp-based, well above existing IDs)
  const newId=Date.now();
  const newAcct={id:newId,company,contact,phone,email,product,fy26};

  if(!acctData.customAccounts)acctData.customAccounts=[];
  acctData.customAccounts.push(newAcct);
  acctData[newId]={lastContact:'',followUp,notes:[],monthlySales:{},fy26_override:fy26||undefined};

  closeModal();saveData();render();
}

function deleteAccount(id){
  if(!confirm('Remove this account? This cannot be undone.'))return;

  }
  delete acctData[id];
  state.detail=null;saveData();render();
}

  const monthInputs=DISPLAY_COLS.map(col=>{
    const val=getMS(a.id,col.key)||'';
    const isCur=col.key===CUR_MONTH_KEY;
    const isFuture=!isBefore(col,CUR_MONTH_IDX,CUR_YEAR)&&!isCur;
    return`<div class="ms-month-cell">
      <div class="ms-month-name ${isCur?'current':''}">${col.label}${isCur?' ★':''}</div>
      <input class="ms-month-input ${val?'has-val':''} ${isCur?'current-month':''}"
        type="number" value="${val}" placeholder="—" data-key="${col.key}"
        onchange="updateMonthInput(${a.id},this)">
    </div>`;
  }).join('');

  app.innerHTML=`
    <div class="detail-back"><button class="back-btn" onclick="closeDetail()">${IC.back} Back</button>
      <div class="sync-badge" style="margin-left:auto"><span class="sync-dot" id="sync-dot"></span><span id="sync-lbl">Synced</span></div></div>
    <div class="detail-panel">
      <div class="detail-header">
        <div class="avatar">${initials(a.contact)}</div>
        <div style="flex:1"><div class="detail-name">${a.contact||a.company}</div><div class="detail-sub">${a.company}</div></div>
        <span class="ar-badge ${badgeClass(st)}" style="align-self:flex-start">${d.followUp||'—'}</span>
      </div>
      <div class="detail-grid">
        <div class="detail-field"><div class="field-label">Phone</div><div class="field-val">${a.phone||'—'}</div></div>
        <div class="detail-field"><div class="field-label">Email</div><div class="field-val" style="font-size:11px">${a.email||'—'}</div></div>
        <div class="detail-field"><div class="field-label">Last contacted</div><div class="field-val">${d.lastContact||'—'}</div></div>
        <div class="detail-field"><div class="field-label">Product</div><div class="field-val" style="font-size:11px">${a.product||'—'}</div></div>
        <div class="detail-field"><div class="field-label">FY27 YTD actual</div><div class="field-val">${ytd?fmt(ytd):'—'}</div></div>
        <div class="detail-field"><div class="field-label">Pace target (${FY_MONTHS_ELAPSED}mo)</div>
          <div class="field-val">${pace?fmt(pace):'—'}${pace&&ytd?`<span style="margin-left:6px;font-size:12px" class="${diff>=0?'up':'dn'}">${fmtSigned(diff)}</span>`:''}</div></div>
      </div>
      <div class="fy26-box">
        <div style="flex:1">
          <div class="fy26-label">FY26 Full Year — used for pace calculation</div>
          <div class="fy26-sub">Monthly avg: ${fmt(monthlyAvg)} &nbsp;|&nbsp; ${FY_MONTHS_ELAPSED}-month pace: ${fmt(pace)}</div>
          <div class="fy26-input-row">
            <input id="fy26-inp-${a.id}" type="number" value="${fy26||''}" placeholder="Enter FY26 total...">
            <button onclick="saveFY26(${a.id})">Update</button>
          </div>
        </div>
        <div class="fy26-pace">
          <div class="fy26-pace-label">vs Pace</div>
          <div class="fy26-pace-val ${pace&&ytd?(diff>=0?'up':'dn'):''}">${pace&&ytd?fmtSigned(diff):'—'}</div>
        </div>
      </div>
      <div class="month-sales-box">
        <div class="ms-label">FY27 Monthly Sales — click any month to edit, saves automatically</div>
        <div class="ms-months-grid">${monthInputs}</div>
      </div>
      <div class="contact-actions">
        ${a.phone?`<a class="big-btn" href="tel:${a.phone.replace(/\D/g,'')}">${IC.phone} Call ${a.contact?a.contact.split(' ')[0]:''}</a>`:''}
        ${a.email?`<a class="big-btn" href="mailto:${a.email}">${IC.mail} Email ${a.contact?a.contact.split(' ')[0]:''}</a>`:''}
        <button class="big-btn accent" onclick="markContacted(${a.id})">${IC.check} Mark contacted</button>
        ${isCustom?`<button class="big-btn danger" onclick="deleteAccount(${a.id})">${IC.trash} Remove</button>`:''}
      </div>
      <div class="followup-box">
        <div class="followup-left"><div class="followup-label">Next follow-up</div><div class="followup-date" id="fu-display">${d.followUp||'Not set'}</div></div>
        <div class="quick-days"><span class="qd-lbl">Set:</span>
          <button class="qd-btn" onclick="setFollowUp(${a.id},3)">+3d</button>
          <button class="qd-btn" onclick="setFollowUp(${a.id},7)">+7d</button>
          <button class="qd-btn" onclick="setFollowUp(${a.id},14)">+14d</button>
          <button class="qd-btn" onclick="setFollowUp(${a.id},30)">+30d</button>
          <input type="date" onchange="setFollowUpDate(${a.id},this.value)">
        </div>
      </div>
      <div class="history-section">
        <h3>Notes & history</h3>
        ${(d.notes&&d.notes.length)?d.notes.map((n,i)=>`<div class="hist-entry">
          <span style="flex:1;${n.startsWith('★')?'color:#3b6d11':''}">${n}</span>
          <button class="hist-del" onclick="deleteNote(${a.id},${i})">${IC.x}</button>
        </div>`).join(''):'<div style="font-size:13px;color:#aaa;padding:8px 0">No notes yet</div>'}
        <div class="add-note-row">
          <input id="note-input" placeholder="Log a call or note..." onkeydown="if(event.key==='Enter')addNote(${a.id})">
          <button onclick="addNote(${a.id})">${IC.plus} Add</button>
        </div>
      </div>
    </div>`;
}

function renderSales(app){
  const curTotal=getCurTotal();
  const allAccts=getAllAccounts();
  const rows=allAccts.map(a=>{
    const fy26=getFY26(a.id);
    const ytd=getFYYTD(a.id);const pace=getPace(a.id);const diff=ytd-pace;
    return{...a,fy26,ytd,pace,diff};
  }).filter(r=>r.fy26>0||r.ytd>0);

  const sc=state.salesSort;
  rows.sort((a,b)=>{
    if(sc.col==='company')return sc.dir==='asc'?a.company.localeCompare(b.company):b.company.localeCompare(a.company);
    if(sc.col==='ytd')return sc.dir==='asc'?a.ytd-b.ytd:b.ytd-a.ytd;
    if(sc.col==='pace')return sc.dir==='asc'?a.pace-b.pace:b.pace-a.pace;
    if(sc.col==='diff')return sc.dir==='asc'?a.diff-b.diff:b.diff-a.diff;
    const av=getMS(a.id,sc.col);const bv=getMS(b.id,sc.col);
    return sc.dir==='asc'?av-bv:bv-av;
  });

  const totYTD=rows.reduce((s,r)=>s+r.ytd,0);
  const totPace=rows.reduce((s,r)=>s+r.pace,0);
  const totDiff=totYTD-totPace;

  function thHTML(col,label,isCurMonth){
    const isSorted=sc.col===col;
    const arrow=isSorted?(sc.dir==='asc'?'▲':'▼'):'⇅';
    return`<th class="${isSorted?'sorted':''} ${isCurMonth?'cur-month':''}" onclick="sortSales('${col}')">${label} <span class="sort-arrow ${isSorted?'active':''}">${arrow}</span></th>`;
  }
  function colTotal(key){return rows.reduce((s,r)=>s+getMS(r.id,key),0);}

  app.innerHTML=tbHTML('sales')+`
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">FY27 YTD actual</div><div class="stat-val">${totYTD?fmt(totYTD):'$0'}</div></div>
      <div class="stat-card"><div class="stat-label">Pace target (${FY_MONTHS_ELAPSED}mo)</div><div class="stat-val">${fmt(totPace)}</div></div>
      <div class="stat-card"><div class="stat-label">vs Pace</div><div class="stat-val ${totDiff>=0?'up':'dn'}">${fmtSigned(totDiff)}</div></div>
      <div class="stat-card"><div class="stat-label">${MONTH_NAMES[CUR_MONTH_IDX].slice(0,3)} so far</div><div class="stat-val">${curTotal?fmt(curTotal):'$0'}</div></div>
    </div>
    <div class="pace-note"><strong>Pace:</strong> FY26 ÷ 12 × ${FY_MONTHS_ELAPSED} months (Apr–${MONTH_NAMES[CUR_MONTH_IDX].slice(0,3)}). Green = ahead, red = behind. Click any cell to edit. Fix FY26 by opening account detail.</div>
    <div class="sales-wrap"><table class="sales-table">
      <thead><tr>
        ${thHTML('company','Account',false)}
        ${thHTML('ytd','YTD',false)}
        ${thHTML('pace','Pace',false)}
        ${thHTML('diff','vs Pace',false)}
        ${DISPLAY_COLS.map(c=>thHTML(c.key,c.label,c.key===CUR_MONTH_KEY)).join('')}
      </tr></thead>
      <tbody>
        ${rows.map(r=>`<tr>
          <td style="cursor:pointer;max-width:140px;overflow:hidden;text-overflow:ellipsis" onclick="switchTab('accounts');setTimeout(()=>openDetail(${r.id}),10)">
            <span style="font-weight:600;color:#185fa5">${r.company}</span>
            ${r.product?`<span style="font-weight:400;color:#888;font-size:10px;display:block">${r.product}</span>`:''}
          </td>
          <td style="font-weight:600">${r.ytd?fmt(r.ytd):'—'}</td>
          <td style="color:#888">${r.pace?fmt(r.pace):'—'}</td>
          <td class="${r.pace&&r.ytd?(r.diff>=0?'up':'dn'):''}">${r.pace&&r.ytd?fmtSigned(r.diff):'—'}</td>
          ${DISPLAY_COLS.map(c=>{
            const val=getMS(r.id,c.key);
            const isCur=c.key===CUR_MONTH_KEY;
            const isFuture=!isBefore(c,CUR_MONTH_IDX,CUR_YEAR)&&!isCur;
            if(state.editingCell&&state.editingCell.id===r.id&&state.editingCell.key===c.key){
              return`<td class="${isCur?'cur-col':''}"><input class="cell-input" id="cell-${r.id}-${c.fyMonth}-inp" type="number" value="${val||''}" placeholder="0" onblur="saveCell(${r.id},'${c.key}',this.value)" onkeydown="if(event.key==='Enter')saveCell(${r.id},'${c.key}',this.value);if(event.key==='Escape'){state.editingCell=null;render();}"></td>`;
            }
            return`<td class="${isCur?'cur-col':''}">
              <span class="cell-display ${!val?'empty-cell':''}" onclick="startCellEdit(${r.id},'${c.key}')">${val?fmt(val):'—'}</span>
            </td>`;
          }).join('')}
        </tr>`).join('')}
        <tr>
          <td>Total</td>
          <td>${fmt(totYTD)}</td>
          <td style="color:#888">${fmt(totPace)}</td>
          <td class="${totDiff>=0?'up':'dn'}">${fmtSigned(totDiff)}</td>
          ${DISPLAY_COLS.map(c=>{const t=colTotal(c.key);const isCur=c.key===CUR_MONTH_KEY;return`<td class="${isCur?'cur-col':''}">${t?fmt(t):'—'}</td>`;}).join('')}
        </tr>
      </tbody>
    </table></div>`;

  if(state.editingCell){
    const inp=document.getElementById(`cell-${state.editingCell.id}-${state.editingCell.fyMonth}-inp`);
    if(inp){inp.focus();inp.select();}
  }
}

function saveFY26(id){
  const inp=document.getElementById('fy26-inp-'+id);if(!inp)return;
  const val=parseFloat(inp.value)||0;
  if(!acctData[id])acctData[id]={lastContact:'',followUp:'',notes:[],monthlySales:{}};
  acctData[id].fy26_override=val;
  saveData();render();
}
function startCellEdit(id,key){
  const col=DISPLAY_COLS.find(c=>c.key===key);
  state.editingCell={id,key,fyMonth:col?col.fyMonth:0};render();
}
function saveCell(id,key,val){
  const v=parseFloat(val)||0;
  if(!acctData[id])acctData[id]={lastContact:'',followUp:'',notes:[],monthlySales:{}};
  if(!acctData[id].monthlySales)acctData[id].monthlySales={};
  acctData[id].monthlySales[key]=v;
  state.editingCell=null;saveData();render();
}
function sortSales(col){
  if(state.salesSort.col===col){state.salesSort.dir=state.salesSort.dir==='asc'?'desc':'asc';}
  else{state.salesSort={col,dir:col==='company'?'asc':'desc'};}render();
}
function switchTab(t){state.tab=t;state.detail=null;state.editingSales=null;state.editingCell=null;render();}
function setSearch(v){state.search=v;render();}
function setFilter(f){state.filter=f;render();}
function setSort(s){state.sort=s;render();}
function openDetail(id){state.detail=id;state.editingSales=null;state.editingCell=null;render();}
function closeDetail(){state.detail=null;state.editingSales=null;render();}
function startEditSales(id){state.editingSales=id;render();}
function saveMonthlySales(id){
  const inp=document.getElementById('ms-inp-'+id);if(!inp)return;
  const val=parseFloat(inp.value)||0;
  if(!acctData[id])acctData[id]={lastContact:'',followUp:'',notes:[],monthlySales:{}};
  if(!acctData[id].monthlySales)acctData[id].monthlySales={};
  acctData[id].monthlySales[CUR_MONTH_KEY]=val;
  state.editingSales=null;saveData();render();
}
function updateMonthInput(id,inp){
  const key=inp.dataset.key;const val=parseFloat(inp.value)||0;
  if(!acctData[id])acctData[id]={lastContact:'',followUp:'',notes:[],monthlySales:{}};
  if(!acctData[id].monthlySales)acctData[id].monthlySales={};
  acctData[id].monthlySales[key]=val;
  inp.classList.toggle('has-val',!!val);saveData();
}
function markContacted(id){
  if(!acctData[id])acctData[id]={lastContact:'',followUp:'',notes:[],monthlySales:{}};
  const d=new Date();const ts=`${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
  acctData[id].lastContact=ts;acctData[id].notes.unshift(`★ Contacted ${ts}`);
  saveData();render();
}
function setFollowUp(id,days){
  if(!acctData[id])acctData[id]={lastContact:'',followUp:'',notes:[],monthlySales:{}};
  acctData[id].followUp=addDays(days);saveData();
  const el=document.getElementById('fu-display');if(el)el.textContent=acctData[id].followUp;
}
function setFollowUpDate(id,val){
  if(!val)return;
  if(!acctData[id])acctData[id]={lastContact:'',followUp:'',notes:[],monthlySales:{}};
  const[y,m,d]=val.split('-');acctData[id].followUp=`${parseInt(m)}/${parseInt(d)}/${y}`;saveData();
  const el=document.getElementById('fu-display');if(el)el.textContent=acctData[id].followUp;
}
function addNote(id){
  const inp=document.getElementById('note-input');if(!inp||!inp.value.trim())return;
  if(!acctData[id])acctData[id]={lastContact:'',followUp:'',notes:[],monthlySales:{}};
  const d=new Date();acctData[id].notes.unshift(`${d.getMonth()+1}/${d.getDate()} ${inp.value.trim()}`);
  saveData();render();
}
function deleteNote(id,idx){
  if(!acctData[id]||!acctData[id].notes)return;
  acctData[id].notes.splice(idx,1);saveData();render();
}


function renderHome(app){
  if(!acctData.notepadData){acctData.notepadData={titles:['','','',''],notes:['','','','']};}
  const nd=acctData.notepadData;
  const d=new Date();
  const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const greeting=`${dayNames[d.getDay()]}, ${monthNames[d.getMonth()]} ${d.getDate()}`;

  app.innerHTML=tbHTML('home')+`
    <div class="home-greeting">${greeting}</div>
    <div class="home-sub">Click any section title to rename it. Your notes save automatically.</div>
    <div class="notes-grid">
      ${[0,1,2,3].map(i=>`
        <div class="note-card">
          <div class="note-card-header">
            <input class="note-title-input" id="note-title-${i}" value="${nd.titles[i]||''}" placeholder="Section ${i+1} — click to name"
              onchange="saveNoteTitle(${i},this.value)" onblur="saveNoteTitle(${i},this.value)">
          </div>
          <textarea class="note-body" id="note-body-${i}" placeholder="Type your notes here..."
            onchange="saveNoteBody(${i},this.value)" oninput="saveNoteBody(${i},this.value)">${nd.notes[i]||''}</textarea>
        </div>
      `).join('')}
    </div>`;
}

function saveNoteTitle(idx,val){
  if(!acctData.notepadData)acctData.notepadData={titles:['','','',''],notes:['','','','']};
  acctData.notepadData.titles[idx]=val;
  saveData();
}
function saveNoteBody(idx,val){
  if(!acctData.notepadData)acctData.notepadData={titles:['','','',''],notes:['','','','']};
  acctData.notepadData.notes[idx]=val;
  saveData();
}

loadData();
</script>
</body>
</html>
